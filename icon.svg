<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="18" fill="#1c1c1c"/>

  <!-- Chip body -->
  <rect x="24" y="24" width="80" height="80" rx="8" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="2"/>

  <!-- Chip pins - top -->
  <rect x="38" y="14" width="8" height="12" rx="2" fill="#555"/>
  <rect x="56" y="14" width="8" height="12" rx="2" fill="#555"/>
  <rect x="74" y="14" width="8" height="12" rx="2" fill="#555"/>

  <!-- Chip pins - bottom -->
  <rect x="38" y="102" width="8" height="12" rx="2" fill="#555"/>
  <rect x="56" y="102" width="8" height="12" rx="2" fill="#555"/>
  <rect x="74" y="102" width="8" height="12" rx="2" fill="#555"/>

  <!-- Chip pins - left -->
  <rect x="14" y="38" width="12" height="8" rx="2" fill="#555"/>
  <rect x="14" y="56" width="12" height="8" rx="2" fill="#555"/>
  <rect x="14" y="74" width="12" height="8" rx="2" fill="#555"/>

  <!-- Chip pins - right -->
  <rect x="102" y="38" width="12" height="8" rx="2" fill="#555"/>
  <rect x="102" y="56" width="12" height="8" rx="2" fill="#555"/>
  <rect x="102" y="74" width="12" height="8" rx="2" fill="#555"/>

  <!-- Thermometer stem -->
  <rect x="59" y="34" width="10" height="38" rx="5" fill="#333"/>
  <rect x="61" y="36" width="6" height="34" rx="3" fill="#111"/>
  <!-- Mercury fill -->
  <rect x="61" y="50" width="6" height="20" rx="3" fill="#e74c3c"/>

  <!-- Thermometer bulb -->
  <circle cx="64" cy="78" r="10" fill="#e74c3c"/>
  <circle cx="64" cy="78" r="6" fill="#ff6b5b"/>

  <!-- Tick marks -->
  <line x1="69" y1="42" x2="74" y2="42" stroke="#444" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="69" y1="50" x2="74" y2="50" stroke="#444" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="69" y1="58" x2="74" y2="58" stroke="#444" stroke-width="1.5" stroke-linecap="round"/>
</svg>
